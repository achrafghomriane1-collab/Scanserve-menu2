<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Istirahat El Kalitoussa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app"></div>
    
    <div id="cart-modal" class="modal hidden">
        <div class="modal-content">
            <span onclick="closeCartModal()" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
            <div id="cart-items-list"></div>
            <div id="modal-footer" style="margin-top:20px; font-weight:bold;"></div>
            <button id="send-btn" onclick="sendOrder()" style="width:100%; margin-top:10px;">Envoyer la commande</button>
        </div>
    </div>

    <div id="cart-footer" class="hidden" onclick="showCartModal()">
        <span>🛒 Voir le panier</span> | <span id="total-price">0</span> da
    </div>

    <script src="script.js"></script>
</body>
</html>
