    { id: 't13', name: 'كبدة مشوية', price: 700, img: 'https://placehold.co/300x200?text=كبدة+مشوية' },

    { id: 'f1', name: 'بيتزا مارغريتا (صغيرة)', price: 500, img: 'https://placehold.co/300x200?text=بيتزا+مارغريتا' },
    { id: 'f2', name: 'بيتزا خضار (وسط)', price: 800, img: 'https://placehold.co/300x200?text=بيتزا+خضار' },
    { id: 'f3', name: 'بيتزا مشكلة (كبيرة)', price: 1200, img: 'https://placehold.co/300x200?text=بيتزا+مشكلة' },
    { id: 'f4', name: 'برجر دجاج', price: 450, img: 'https://placehold.co/300x200?text=برجر+دجاج' },

  drinks: [
    { id: 'd1', name: 'عصير برتقال طازج', price: 150, img: 'https://placehold.co/300x200?text=عصير+برتقال' },
    { id: 'd2', name: 'عصير ليمون نعناع', price: 150, img: 'https://placehold.co/300x200?text=ليمون+نعناع' },
    { id: 'd3', name: 'عصير مانجو/أناناس', price: 180, img: 'https://placehold.co/300x200?text=مانجو' },

    { id: 'd8', name: 'مياه معدنية 0.5L', price: 50, img: 'https://placehold.co/300x200?text=مياه' },
    { id: 'd9', name: 'مشروب غازي', price: 100, img: 'https://placehold.co/300x200?text=مشروب+غازي' },

};for (let i = 1; i <= 12; i++) {
  const btn = document.createElement('div');
  btn.className = 'table-btn';
  btn.textContent = i;
  btn.onclick = () => selectTable(i, btn);
  document.getElementById('tableGrid').appendChild(btn);
}

function selectTable(num, btnEl) {
  selectedTable = num;
  document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('selected'));
  btnEl.classList.add('selected');
  document.getElementById('confirmTableBtn').disabled = false;
}

function goToCategories() {
  document.getElementById('tableLabel').textContent = 'الطاولة رقم ' + selectedTable;
  showScreen('screen-categories');
}

function openCategory(cat) {
  const titles = { traditional: 'أكل تقليدي', fast: 'أكل سريع', drinks: 'مشروبات' };
  document.getElementById('categoryTitle').textContent = titles[cat];
  const list = document.getElementById('dishList');
  list.innerHTML = '';
  menu[cat].forEach(dish => {
    const qty = cart[dish.id] || 0;
    const card = document.createElement('div');
    card.className = 'dish-card';
    card.innerHTML = `
      <img src="${dish.img}">
      <div class="dish-info">
        <h3>${dish.name}</h3>
        <div class="dish-row">
          <span class="price">${dish.price} دج</span>
          <div class="qty-box">
            <button onclick="changeQty('${dish.id}', -1)">−</button>
            <span id="qty-${dish.id}">${qty}</span>
            <button onclick="changeQty('${dish.id}', 1)">+</button>
          </div>
        </div>
      </div>`;
    list.appendChild(card);
  });
  showScreen('screen-dishes');
}

function changeQty(id, delta) {
  cart[id] = Math.max(0, (cart[id] || 0) + delta);
  document.getElementById('qty-' + id).textContent = cart[id];
  updateCartBar();
}

function updateCartBar() {
  let total = 0, count = 0;
  const allDishes = [...menu.traditional, ...menu.fast, ...menu.drinks];
  for (let id in cart) {
    if (cart[id] > 0) {
      count += cart[id];
      const dish = allDishes.find(d => d.id === id);
      total += dish.price * cart[id];
    }
  }
  const bar = document.getElementById('cartBar');
  if (count > 0) {
    bar.classList.add('show');
    document.getElementById('cartTotal').textContent = total + ' دج (' + count + ')';
  } else {
    bar.classList.remove('show');
  }
}

function sendOrder() {
  showScreen('screen-confirm');
  document.getElementById('cartBar').classList.remove('show');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
</script>
</body>
</html>
